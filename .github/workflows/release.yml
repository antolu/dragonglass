name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for setuptools-scm to find tags
          lfs: true
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools>=61 setuptools-scm[toml]~=6.0 wheel

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node (npm) and pnpm
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Build macOS App
        run: |
          # Note: This builds an UNSIGNED app. For signed/notarized releases in CI:
          # 1. Export your Apple Developer ID Certificate as .p12
          # 2. Add it to GitHub Secrets
          # 3. Add steps to import the certificate into a temporary keychain
          # 4. Configure xcodebuild to use the imported identity
          #
          # The Xcode build script in project.pbxproj already handles downloading dependencies,
          # building the Python wheels, and bundling them into the resources.
          xcodebuild -project DragonglassApp/Dragonglass.xcodeproj \
                     -scheme Dragonglass \
                     -configuration Release \
                     -derivedDataPath build/derivedData \
                     -clonedSourcePackagesDirPath build/derivedData/SourcePackages \
                     clean build

      - name: Prepare Artifact
        run: |
          APP_PATH="build/derivedData/Build/Products/Release/Dragonglass.app"
          ZIP_NAME="Dragonglass-${{ github.ref_name }}.zip"
          cd $(dirname "$APP_PATH")
          zip -r "../../../../$ZIP_NAME" "Dragonglass.app"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: Dragonglass-*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
