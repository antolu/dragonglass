name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Build Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools>=61 setuptools-scm[toml]~=10.0

      - name: Get app version
        id: version
        run: echo "version=$(python -c 'import setuptools_scm; print(setuptools_scm.get_version(local_scheme="no-local-version"))')" >> $GITHUB_OUTPUT

      - name: Compute deps hashes
        id: hashes
        run: |
          echo "py_hash=$(python scripts/compute_deps_hash.py --type python)" >> $GITHUB_OUTPUT
          echo "oc_hash=$(python scripts/compute_deps_hash.py --type opencode)" >> $GITHUB_OUTPUT

      - name: Download Python bundles from deps tag
        run: |
          mkdir -p dist/bundles/python
          gh release download "deps/py-${{ steps.hashes.outputs.py_hash }}" \
            --pattern "dragonglass-deps-*" \
            --dir dist/bundles/python
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download opencode bundle from deps tag
        run: |
          mkdir -p dist/bundles/opencode
          gh release download "deps/oc-${{ steps.hashes.outputs.oc_hash }}" \
            --pattern "dragonglass-opencode-*" \
            --dir dist/bundles/opencode || echo "No opencode bundle found, skipping"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate manifest
        run: |
          OC_BUNDLE="$(ls dist/bundles/opencode/*.tar.gz 2>/dev/null | head -1 || true)"
          if [ -n "$OC_BUNDLE" ]; then
            python scripts/generate_manifest.py \
              --python-bundles-dir dist/bundles/python \
              --opencode-bundle "$OC_BUNDLE" \
              --app-version ${{ steps.version.outputs.version }} \
              --output dist/manifest.json
          else
            python scripts/generate_manifest.py \
              --python-bundles-dir dist/bundles/python \
              --app-version ${{ steps.version.outputs.version }} \
              --output dist/manifest.json
          fi

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Build macOS App
        run: |
          xcodebuild -workspace DragonglassApp/Dragonglass.xcodeproj/project.xcworkspace \
                     -scheme Dragonglass \
                     -configuration Release \
                     clean build

      - name: Prepare Artifact
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Dragonglass.app" -path "*/Release/*" | head -1)
          ZIP_NAME="Dragonglass-${{ github.ref_name }}.zip"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "Dragonglass.app"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Dragonglass-*.zip
            dist/manifest.json
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
