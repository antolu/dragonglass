name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: |
          set -o pipefail
          python -m pytest -vv --maxfail=1 --durations=10 | tee pytest.log

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-log
          path: pytest.log

      - name: Upload pip freeze
        if: always()
        run: pip freeze > pip-freeze.txt
      - name: Upload pip freeze artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pip-freeze
          path: pip-freeze.txt

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node (npm) and pnpm
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          package-manager-cache: false

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Build
        run: |
          xcodebuild -workspace DragonglassApp/Dragonglass.xcodeproj/project.xcworkspace \
                     -scheme Dragonglass \
                     -configuration Release \
                     CODE_SIGNING_ALLOWED=NO \
                     build 2>&1 | tee xcodebuild.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-log
          path: xcodebuild.log
